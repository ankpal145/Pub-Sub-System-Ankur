server.port=8080
spring.application.name=pub-sub-system

# WebSocket configuration
spring.websocket.allowed-origins=*

# Logging
logging.level.com.pubsub=INFO
logging.level.org.springframework.web=INFO

# Optional API key for REST & WebSocket (X-API-Key header).
# If left blank, auth is disabled.
app.api-key=my-key
